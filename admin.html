<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin Clarisse - Gerenciamento</title>
  <meta name="theme-color" content="#8c5be9">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing:border-box; }
    body {
      margin:0;
      overflow-x:hidden;
      font-family:Inter, Arial, sans-serif;
      background:linear-gradient(180deg,#8c5be9 0,#f3ecff 22%,#ffffff 100%);
      color:#241a55;
    }
    h1,h2,h3,button { font-family:Poppins, Inter, Arial, sans-serif; }
    .wrap { max-width:1200px; margin:0 auto; padding:12px 8px; }
    .card {
      background:rgba(255,255,255,.96);
      border-radius:20px;
      padding:14px;
      box-shadow:0 14px 34px rgba(52,26,115,.12);
    }
    .topbar {
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-bottom:14px;
    }
    .helper {
      color:#6f6894;
      line-height:1.5;
      font-size:.94rem;
      margin-top:6px;
    }
    .actions {
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .actions button {
      width:100%;
      border:0;
      border-radius:14px;
      padding:14px 16px;
      color:#fff;
      font-size:.94rem;
      font-weight:700;
      cursor:pointer;
    }
    .primary { background:linear-gradient(135deg,#ea79c7,#8c5be9); }
    .secondary { background:linear-gradient(135deg,#59d8c5,#2baca8); }
    .add { background:linear-gradient(135deg,#b7df37,#7fae12); }
    .stats {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin:16px 0;
    }
    .stat {
      background:#fff;
      border:2px solid #eadffd;
      border-radius:18px;
      padding:14px;
    }
    .stat-number {
      font-size:1.6rem;
      font-weight:800;
      line-height:1;
    }
    .stat-label {
      color:#6c6591;
      font-size:.84rem;
      margin-top:6px;
      line-height:1.3;
    }
    .filters {
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-bottom:14px;
    }
    input, select {
      width:100%;
      border:2px solid #eadffd;
      border-radius:14px;
      padding:13px 14px;
      font:inherit;
      color:#241a55;
      background:#fff;
    }
    .table-wrap {
      overflow:auto;
      border:2px solid #eadffd;
      border-radius:18px;
      background:#fff;
    }
    table {
      width:100%;
      min-width:900px;
      border-collapse:collapse;
    }
    th, td {
      padding:12px 10px;
      text-align:left;
      border-bottom:1px solid #f0eaff;
      vertical-align:middle;
      font-size:.92rem;
    }
    th {
      background:#faf7ff;
      position:sticky;
      top:0;
      z-index:1;
      font-size:.84rem;
    }
    .pill {
      display:inline-block;
      padding:7px 10px;
      border-radius:999px;
      font-size:.78rem;
      font-weight:700;
      white-space:nowrap;
    }
    .sim { background:#e9fbf3; color:#1f9d73; }
    .nao { background:#fff0f3; color:#d33b5b; }
    .small { color:#6c6591; font-size:.84rem; }

    /* Botões de Ação na Tabela */
    .btn-icon {
      border: 0;
      background: none;
      cursor: pointer;
      padding: 5px;
      border-radius: 8px;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    .btn-edit:hover { background: #eef2ff; color: #4f46e5; }
    .btn-delete:hover { background: #fef2f2; color: #ef4444; }

    /* Modal de Edição */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #fff;
      border-radius: 24px;
      width: 100%;
      max-width: 500px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }
    .modal-header { margin-bottom: 20px; }
    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }
    .modal-footer button {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 0;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-cancel { background: #f3f4f6; color: #374151; }
    .btn-save { background: #8c5be9; color: #fff; }

    @media (min-width:760px) {
      .wrap { padding:18px; }
      .card { padding:18px; border-radius:24px; }
      .topbar { flex-direction:row; justify-content:space-between; align-items:flex-start; }
      .actions { flex-direction:row; }
      .actions button { width:auto; min-width:160px; }
      .stats { grid-template-columns:repeat(4,minmax(0,1fr)); }
      .filters { flex-direction:row; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <div>
          <h1>Painel da anfitriã</h1>
          <p class="helper">Gerencie seus convidados. As alterações são salvas diretamente na planilha.</p>
        </div>
        <div class="actions">
          <button id="addBtn" class="add" type="button">+ Adicionar</button>
          <button id="refreshBtn" class="primary" type="button">Atualizar agora</button>
          <button id="exportBtn" class="secondary" type="button">Exportar XLSX</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><div id="totalCount" class="stat-number">0</div><div class="stat-label">Total de respostas</div></div>
        <div class="stat"><div id="simCount" class="stat-number">0</div><div class="stat-label">Confirmações</div></div>
        <div class="stat"><div id="naoCount" class="stat-number">0</div><div class="stat-label">Não irão</div></div>
        <div class="stat"><div id="pessoasCount" class="stat-number">0</div><div class="stat-label">Total de pessoas</div></div>
      </div>

      <div class="filters">
        <input id="search" placeholder="Buscar por nome, telefone ou observação">
        <select id="presenceFilter">
          <option value="Todos">Todos</option>
          <option value="Sim">Somente confirmações</option>
          <option value="Não">Somente não irão</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Enviado em</th>
              <th>Nome</th>
              <th>Presença</th>
              <th>Adultos</th>
              <th>Crianças</th>
              <th>Telefone</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal de Edição / Adição -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header"><h2 id="modalTitle">Editar Convidado</h2></div>
      <form id="editForm">
        <input type="hidden" id="editRowId">
        <div style="display:grid; gap:15px;">
          <div><label>Nome</label><input id="editNome" required></div>
          <div><label>Presença</label>
            <select id="editPresenca">
              <option value="Sim">Sim</option>
              <option value="Não">Não</option>
            </select>
          </div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>Adultos</label><input type="number" id="editAdultos" min="0" value="1"></div>
            <div><label>Crianças</label><input type="number" id="editCriancas" min="0" value="0"></div>
          </div>
          <div><label>Telefone</label><input id="editTelefone"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn-save" id="modalSaveBtn">Salvar Alterações</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwR_xHmJ0Q9uDtZLqQG95QyLHrYHkI1XmgBq2yASmbtZjIhvhi-X_kFSo83pSNwauny0w/exec";

    // Dados do evento (iguais aos do convite) para novos registros
    const EVENTO = "Clarisse - 3 anos";
    const DATA_EVENTO = "03/07/2026 20:00";

    const tbody = document.getElementById("tbody");
    const totalCount = document.getElementById("totalCount");
    const simCount = document.getElementById("simCount");
    const naoCount = document.getElementById("naoCount");
    const pessoasCount = document.getElementById("pessoasCount");
    const searchInput = document.getElementById("search");
    const presenceFilter = document.getElementById("presenceFilter");
    const addBtn = document.getElementById("addBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const exportBtn = document.getElementById("exportBtn");
    const modalTitle = document.getElementById("modalTitle");
    const modalSaveBtn = document.getElementById("modalSaveBtn");

    let allRows = [];

    function escapeHtml(text) {
      return String(text ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
    }

    // Faz a requisição via GET com parâmetros na URL (formato que o Apps Script entende)
    // e considera sucesso quando status === "ok" (ou "success", por compatibilidade).
    async function callApi(params) {
      const query = new URLSearchParams(params);
      query.set("_", Date.now().toString()); // evita cache
      const response = await fetch(`${GOOGLE_SCRIPT_URL}?${query.toString()}`, { method: "GET" });
      const result = await response.json();
      const ok = result && (result.status === "ok" || result.status === "success");
      if (!ok) throw new Error(result && result.message ? result.message : "Falha na operação");
      return result;
    }

    function renderTable() {
      const q = searchInput.value.trim().toLowerCase();
      const f = presenceFilter.value;

      const filtered = allRows.filter(row => {
        const matchesSearch = !q || [row.nome, row.telefone, row.observacoes].join(" ").toLowerCase().includes(q);
        const matchesPresence = f === "Todos" || row.presenca === f;
        return matchesSearch && matchesPresence;
      });

      tbody.innerHTML = filtered.map(row => `
        <tr>
          <td class="small">${escapeHtml(row.enviadoEm)}</td>
          <td>${escapeHtml(row.nome)}</td>
          <td><span class="pill ${row.presenca === 'Sim' ? 'sim' : 'nao'}">${escapeHtml(row.presenca)}</span></td>
          <td>${row.adultos || 0}</td>
          <td>${row.criancas || 0}</td>
          <td>${escapeHtml(row.telefone)}</td>
          <td>
            <button class="btn-icon btn-edit" onclick="openEdit(${row.rowId})" title="Editar">✏️</button>
            <button class="btn-icon btn-delete" onclick="deleteRow(${row.rowId})" title="Excluir">🗑️</button>
          </td>
        </tr>
      `).join("");

      totalCount.textContent = filtered.length;
      simCount.textContent = filtered.filter(r => r.presenca === "Sim").length;
      naoCount.textContent = filtered.filter(r => r.presenca === "Não").length;
      pessoasCount.textContent = filtered
        .filter(r => r.presenca === "Sim")
        .reduce((acc, r) => acc + (parseInt(r.adultos || 0) + parseInt(r.criancas || 0) || 1), 0);
    }

    async function loadData() {
      try {
        const result = await callApi({ action: "list" });
        allRows = Array.isArray(result.rows) ? result.rows : [];
        renderTable();
      } catch (e) {
        console.error("[v0] Erro ao carregar:", e);
      }
    }

    // Abre o modal em modo "Adicionar"
    function openAdd() {
      modalTitle.textContent = "Adicionar Convidado";
      modalSaveBtn.textContent = "Adicionar";
      document.getElementById("editRowId").value = "";
      document.getElementById("editNome").value = "";
      document.getElementById("editPresenca").value = "Sim";
      document.getElementById("editAdultos").value = 1;
      document.getElementById("editCriancas").value = 0;
      document.getElementById("editTelefone").value = "";
      document.getElementById("editModal").classList.add("active");
    }

    // Abre o modal em modo "Editar"
    function openEdit(rowId) {
      const row = allRows.find(r => r.rowId === rowId);
      if (!row) return;
      modalTitle.textContent = "Editar Convidado";
      modalSaveBtn.textContent = "Salvar Alterações";
      document.getElementById("editRowId").value = rowId;
      document.getElementById("editNome").value = row.nome;
      document.getElementById("editPresenca").value = row.presenca;
      document.getElementById("editAdultos").value = row.adultos || 0;
      document.getElementById("editCriancas").value = row.criancas || 0;
      document.getElementById("editTelefone").value = row.telefone || "";
      document.getElementById("editModal").classList.add("active");
    }

    function closeModal() {
      document.getElementById("editModal").classList.remove("active");
    }

    document.getElementById("editForm").onsubmit = async (e) => {
      e.preventDefault();

      const rowIdValue = document.getElementById("editRowId").value;
      const isEdit = rowIdValue !== "";

      const nome = document.getElementById("editNome").value.trim();
      const presenca = document.getElementById("editPresenca").value;
      const adultos = document.getElementById("editAdultos").value;
      const criancas = document.getElementById("editCriancas").value;
      const telefone = document.getElementById("editTelefone").value.trim();

      if (!nome) { alert("Informe o nome."); return; }

      const params = isEdit
        ? {
            action: "edit",
            rowId: rowIdValue,
            nome, presenca, adultos, criancas, telefone
          }
        : {
            // Mesma ordem de campos do RSVP no convite (index.html)
            action: "add",
            evento: EVENTO,
            dataEvento: DATA_EVENTO,
            nome,
            telefone,
            presenca,
            adultos,
            criancas,
            enviadoEm: new Date().toLocaleString("pt-BR")
          };

      modalSaveBtn.disabled = true;
      const originalText = modalSaveBtn.textContent;
      modalSaveBtn.textContent = "Salvando...";

      try {
        await callApi(params);
        closeModal();
        await loadData();
      } catch (err) {
        console.error("[v0] Erro ao salvar:", err);
        alert("Não foi possível salvar. Tente novamente.");
      } finally {
        modalSaveBtn.disabled = false;
        modalSaveBtn.textContent = originalText;
      }
    };

    async function deleteRow(rowId) {
      if (!confirm("Tem certeza que deseja excluir este convidado?")) return;
      try {
        await callApi({ action: "delete", rowId: rowId });
        await loadData();
      } catch (e) {
        console.error("[v0] Erro ao excluir:", e);
        alert("Não foi possível excluir. Tente novamente.");
      }
    }

    function exportXLSX() {
      const ws = XLSX.utils.json_to_sheet(allRows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Convidados");
      XLSX.writeFile(wb, "convidados-clarisse.xlsx");
    }

    searchInput.addEventListener("input", renderTable);
    presenceFilter.addEventListener("change", renderTable);
    addBtn.addEventListener("click", openAdd);
    refreshBtn.addEventListener("click", loadData);
    exportBtn.addEventListener("click", exportXLSX);

    loadData();
    setInterval(loadData, 15000);
  </script>
</body>
</html>
